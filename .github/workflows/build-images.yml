name: Build and Publish Docker Images

on:
  push:
    #branches:
    #  - dev
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build and push"
        required: true
        type: choice
        default: all
        options:
          - all
          - lamb
          - lamb-kb
          - openwebui
      manual_tag:
        description: "Tag to publish for manual runs (for example: dev or v0.5.0)"
        required: true
        default: dev

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: lamb
            dockerfile: backend/Dockerfile
            context: .
          - image_name: lamb-kb
            dockerfile: lamb-kb-server-stable/Dockerfile
            context: lamb-kb-server-stable
          - image_name: openwebui
            dockerfile: open-webui/Dockerfile
            context: open-webui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == matrix.image_name }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.manual_tag, 'v')) }}
            type=raw,value=dev,enable=${{ github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/dev' }}
            type=ref,event=tag
            type=raw,value=${{ github.event.inputs.manual_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
